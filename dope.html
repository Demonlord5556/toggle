<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Productivity Dashboard</title>
    <link rel="stylesheet" href="hm.css">
</head>
<body>

    <div class="container">
        <div class="left-col">
            <div class="panel">
                <div id="clock">00:00:00</div>
                <div id="calendar">
                    <div class="cal-header">
                        <button id="prevMonth">&lt;</button>
                        <div id="monthYear">Month Year</div>
                        <button id="nextMonth">&gt;</button>
                    </div>
                    <div class="cal-weekdays">
                        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                    </div>
                    <div class="cal-days" id="calDays"></div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="panel">
                <h2>Task Manager</h2>
                <div class="todo-header">
                    <input type="text" id="taskInput" placeholder="Add a new task...">
                    <button id="addBtn">Add</button>
                </div>
                <ul id="taskList"></ul>
            </div>
        </div>
    </div>

    <div id="emptyTaskPopup" class="popup-overlay">
        <div class="popup-content">
            <p>You need to type a task first!</p>
            <button id="closePopupBtn">Got it</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
